name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "version"
        required: true
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
  resolve-version:
    name: resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

  check:
    name: check
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable

      - name: check
        run: cargo check --workspace

  compile:
    name: compile ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: [resolve-version, check]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            bootstrap: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
            binary: cargo

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            bootstrap: |
              sudo apt-get update
              sudo apt-get -y install podman
              cargo install cross
              cargo clean
            binary: cross

          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            bootstrap: rustup target add x86_64-apple-darwin
            binary: cargo

          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            bootstrap: ""
            binary: cargo

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            binary: cargo

          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            archive: zip
            binary: cargo

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.target }}"

      - name: bootstrap
        if: ${{ matrix.bootstrap != '' }}
        run: ${{ matrix.bootstrap }}

      - name: build binary
        run: ${{ matrix.binary }} build -p tonel-smalltalk-language-server --verbose --locked --release --target ${{ matrix.target }}

      - name: prepare for upload
        shell: bash
        id: vars
        run: |
          BIN_SUFFIX=""
          if [[ "${{ matrix.runner }}" == "windows-latest" || "${{ matrix.runner }}" == "windows-11-arm" ]]; then
            BIN_SUFFIX=".exe"
          fi

          BIN_OUTPUT="target/${{ matrix.target }}/release/tonel-smalltalk-language-server${BIN_SUFFIX}"
          ARCHIVE_NAME="tonel-smalltalk-language-server-${{ matrix.target }}"

          mkdir tmp/
          mkdir "tmp/${ARCHIVE_NAME}"

          mv "${BIN_OUTPUT}" "tmp/${ARCHIVE_NAME}"
          cp LICENSE "tmp/${ARCHIVE_NAME}" 2>/dev/null || true
          cp README.md "tmp/${ARCHIVE_NAME}" 2>/dev/null || true

          if [[ "${{ matrix.archive }}" == "tar.gz" ]]; then
            ARCHIVE_PATH="tmp/${ARCHIVE_NAME}.tar.gz"
            tar -czvf "${ARCHIVE_PATH}" -C "tmp" "${ARCHIVE_NAME}"
          else
            ARCHIVE_PATH="tmp/${ARCHIVE_NAME}.zip"

            cd tmp
            if [[ "${{ matrix.runner }}" == "windows-latest" || "${{ matrix.runner }}" == "windows-11-arm" ]]; then
              7z a "../${ARCHIVE_PATH}" "${ARCHIVE_NAME}"
            else
              zip -r "../${ARCHIVE_PATH}" "${ARCHIVE_NAME}"
            fi

            cd ..
          fi

          echo "archive_name=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT
          echo "archive_path=${ARCHIVE_PATH}" >> $GITHUB_OUTPUT

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.archive_name }}
          path: ${{ steps.vars.outputs.archive_path }}

  release:
    name: release
    runs-on: ubuntu-latest
    needs: [resolve-version, compile]
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: create release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          name: v${{ needs.resolve-version.outputs.version }}
          draft: true
          files: |
            artifacts/**/*
